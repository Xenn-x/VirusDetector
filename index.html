<!DOCTYPE html>
<html>
<head>
<title>Android Security</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
padding:20px;
overflow:hidden;
}

h1{
color:red;
text-align:center;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

#progress{
width:100%;
height:30px;
background:#222;
margin-top:20px;
}

#bar{
width:0%;
height:100%;
background: lightgreen;
}

.warning{
color:red;
font-size:20px;
margin-top:20px;
}

button{
margin-top:30px;
padding:15px;
font-size:18px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
opacity:0;
animation:flash 0.9s infinite;
pointer-events:none;
}

@keyframes flash{
0%{opacity:0;}
50%{opacity:0.2;}
100%{opacity:0;}
}
/* matrix full screen */
#matrix{
position: fixed;
top: 0;
left: 0;
width: 100vw;
height: 100vh;
color:#00ff00;
font-family:monospace;
font-size:14px;
opacity:0.15;
pointer-events:none;
overflow:hidden;
white-space:pre;
}
</style>

</head>

<body>

<div class="flash"></div>
<div id="matrix"></div>

<h1 id="h1">⚠ ANDROID SECURITY WARNING ⚠</h1>

<p>Scanning system files...</p>

<div id="progress">
<div id="bar"></div>
</div>

<p id="percent">0%</p>

<p class="warning" id="status"></p>

<button onclick="fix()" id="btn">FIX VIRUS NOW</button>

<script>

let width = 0;

let bar = document.getElementById("bar");
let percent = document.getElementById("percent");
let status = document.getElementById("status");
const sound = new Audio("sound1.mp3");
let flash = document.querySelector(".flash");
let header = document.getElementById("h1");
let btn = document.getElementById("btn");

flash.style.background = "none";

btn.style.display = "none";

header.innerHTML = "⚠ ANDROID SECURITY SCANNING ⚠";
header.style.color = "green";
let scan = setInterval(function(){

if(width >= 100){

clearInterval(scan);

status.innerHTML="⚠ 9312 VIRUSES DETECTED ⚠";
btn.style.display = "block";
setTimeout(()=>{
alert("WARNING! Your phone is infected!");
},1000);

setTimeout(()=>{
},3000);

setTimeout(()=>{

},5000);

setTimeout(()=>{
alert("Device will explode!! ");
},7000);

}

else{

width++;

bar.style.width = width + "%";
percent.innerHTML = width + "%";

if(width==30){
status.innerHTML="Checking apps...";
}

if(width==55){
status.innerHTML="Suspicious activity detected...";
}

if(width==80){
status.innerHTML="Malware detected!";
//run style .flash
bar.style.background = "red";
flash.style.background = "none";

header.innerHTML = "⚠ ANDROID SECURITY WARNING! ⚠";
header.style.color = "red";

sound.loop = true;
sound.play();

}

}

},80);

function fix(){
alert("System repairing...");
setTimeout(()=>{
alert("😂 Tenang! Ini cuma prank!");
},2000);
}

/* efek angka seperti hacker */

const matrix = document.getElementById("matrix");

function randomLine(){

let chars="01 0110 101 0101 01 010101 0110 10101  0101 01 01 11010 010101 010    0101010  1 0101 01011010  01";
let line="";

for(let i=0;i<80;i++){
line+=chars[Math.floor(Math.random()*chars.length)];
}

return line;

}

setInterval(()=>{

matrix.innerText += randomLine() + "\n";

if(matrix.innerText.length>3000){
matrix.innerText = matrix.innerText.substring(1000);
}

},100);


</script>

</body>
</html>
